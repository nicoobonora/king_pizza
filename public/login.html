<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>King Pizza - Accesso Staff</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="/css/styles.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f2df0d",
            "background-light": "#f8f8f5",
            "background-dark": "#222110",
            "crust": "#c17817",
            "sauce": "#d32f2f"
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          }
        }
      }
    };
  </script>
  <script src="/js/app.js" defer></script>
  <script src="/js/login.js" defer></script>
</head>
<body class="bg-primary font-display min-h-screen flex items-center justify-center p-4">

  <!-- Background decorations -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <span class="material-symbols-outlined absolute top-10 left-10 text-8xl text-black/5 rotate-12">local_pizza</span>
    <span class="material-symbols-outlined absolute bottom-20 right-10 text-8xl text-black/5 -rotate-12">local_pizza</span>
    <span class="material-symbols-outlined absolute top-1/3 right-5 text-6xl text-black/5 rotate-45">restaurant</span>
    <span class="material-symbols-outlined absolute bottom-1/3 left-5 text-6xl text-black/5 -rotate-45">bakery_dining</span>
  </div>

  <!-- Crust-like Border Container -->
  <div class="relative w-full max-w-md bg-background-light p-1 border-[12px] border-crust rounded-xl shadow-2xl overflow-hidden">
    <!-- Main Content -->
    <div class="relative flex w-full flex-col bg-background-light p-6 sm:p-8">

      <!-- Logo/Icon Section -->
      <div class="flex flex-col items-center justify-center mb-8">
        <div class="bg-primary p-4 rounded-full mb-4 ring-4 ring-sauce/20">
          <img alt="Pizza Steve" class="w-24 h-24 object-contain" src="/images/pizza-steve-suit.png"/>
        </div>
        <h2 class="text-background-dark text-3xl font-bold leading-tight tracking-tight text-center">Staff di King Pizza</h2>
        <div class="h-1 w-16 bg-sauce mt-2 rounded-full"></div>
      </div>

      <!-- Welcome Header -->
      <div class="text-center mb-8">
        <h1 class="text-slate-900 text-2xl font-bold mb-2">Ehil&agrave;! Ben tornato</h1>
        <div class="bg-primary/20 rounded-lg p-3 border border-primary/40">
          <p class="text-background-dark text-sm font-medium leading-normal italic">
            "Solo per i veri duri. Resta radicale."
          </p>
        </div>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm font-medium text-center"></div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-6">
        <div class="space-y-4">
          <label class="block">
            <span class="text-slate-900 text-sm font-semibold mb-2 block px-1">Nome Utente Radicale</span>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
              <input id="username" class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-primary focus:border-crust focus:ring-crust bg-white transition-all" placeholder="Inserisci il tuo nome radicale" type="text" autocomplete="username" required/>
            </div>
          </label>

          <label class="block">
            <span class="text-slate-900 text-sm font-semibold mb-2 block px-1">Password Segreta</span>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
              <input id="password" class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-primary focus:border-crust focus:ring-crust bg-white transition-all" placeholder="••••••••" type="password" autocomplete="current-password" required/>
            </div>
          </label>
        </div>

        <!-- Pizza Slice Login Button -->
        <div class="pt-4 flex justify-center">
          <button type="submit" id="login-btn" class="group relative flex items-center justify-center transition-transform hover:scale-105 active:scale-95">
            <div class="triangle-btn bg-primary font-black text-xl uppercase tracking-wider text-slate-900 hover:bg-yellow-300 transition-colors">
              ACCEDI
            </div>
            <!-- Decorative pepperoni dots on triangle -->
            <div class="absolute top-2 left-6 w-3 h-3 rounded-full bg-sauce/60"></div>
            <div class="absolute top-3 right-8 w-2 h-2 rounded-full bg-sauce/40"></div>
          </button>
        </div>
      </form>

      <!-- Decorative bottom icons -->
      <div class="flex justify-center gap-12 mt-8 text-slate-300">
        <span class="material-symbols-outlined text-3xl">grade</span>
        <span class="material-symbols-outlined text-3xl">nutrition</span>
        <span class="material-symbols-outlined text-3xl">flare</span>
      </div>

      <!-- Loading spinner -->
      <div id="loading" class="hidden absolute inset-0 bg-background-light/80 flex items-center justify-center rounded-xl">
        <div class="flex flex-col items-center gap-3">
          <span class="material-symbols-outlined text-5xl text-primary animate-spin">sync</span>
          <p class="text-sm font-bold text-slate-500">Accesso in corso...</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
