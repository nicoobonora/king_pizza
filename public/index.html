        LE NOSTRE PIZZE

      <a href="tel:+393500261148" class="flex items-center justify-center gap-2 bg-white border-4 border-black rounded-full py-4 px-8 font-bold text-lg pizza-card-shadow hover:translate-y-1 hover:shadow-none transition-all">
        <span class="material-symbols-outlined">phone</span>
        CHIAMA
      </a>
    </div>


    <!-- Staff Access Link -->

      <a href="/login.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">
        ACCESSO STAFF
      </a>
    </div>
  </main>
