<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>King Pizza - Le Nostre Pizze</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="/css/styles.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f2df0d",
            "background-light": "#f8f8f5",
            "background-dark": "#222110",
            "crust": "#c17817",
            "sauce": "#d32f2f"
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          }
        }
      }
    };
  </script>
  <script src="/js/app.js" defer></script>
  <script src="/js/menu.js" defer></script>
</head>
<body class="bg-background-light font-display text-slate-900">

  <!-- Header Section -->
  <div class="sticky top-0 z-50 bg-primary border-b-4 border-black px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-3xl font-bold">local_pizza</span>
      <h1 class="text-2xl font-black uppercase tracking-tighter header-skew">King Pizza</h1>
    </div>
    <a href="/" class="flex items-center justify-center w-10 h-10">
      <span class="material-symbols-outlined">home</span>
    </a>
  </div>

  <!-- Hero Banner -->
  <div class="p-4">
    <div class="relative overflow-hidden rounded-xl bg-crust border-4 border-black min-h-[180px] flex flex-col justify-end p-6"
         style="background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800&q=80'); background-size: cover; background-position: center;">
      <h2 class="text-primary text-4xl font-black uppercase italic leading-none drop-shadow-md">Le Nostre<br/>Pizze</h2>
      <div class="absolute top-4 right-4 bg-primary border-2 border-black px-3 py-1 rounded-full font-bold text-xs uppercase -rotate-12">Calde e deliziose</div>
    </div>
  </div>

  <!-- Menu Actions -->
  <div class="px-4 pb-4 flex gap-2 overflow-x-auto no-scrollbar">
    <button id="download-pdf" class="whitespace-nowrap bg-primary border-2 border-black px-4 py-2 rounded-full font-bold flex items-center gap-2 pizza-card-shadow active:translate-y-1 active:shadow-none transition-all">
      <span class="material-symbols-outlined text-lg">download</span> Scarica Menu PDF
    </button>
    <button id="filter-btn" class="whitespace-nowrap bg-white border-2 border-black px-4 py-2 rounded-full font-bold flex items-center gap-2 pizza-card-shadow active:translate-y-1 active:shadow-none transition-all">
      <span class="material-symbols-outlined text-lg">filter_alt</span> Filtra
    </button>
  </div>

  <!-- Category Tabs -->
  <div class="px-4 mb-6">
    <div class="flex border-b-4 border-black/10 gap-6">
      <a data-category="speciali" class="border-b-4 border-primary pb-2 font-black text-lg uppercase cursor-pointer text-slate-900" href="#">Speciali</a>
      <a data-category="classiche" class="pb-2 font-bold text-lg uppercase text-slate-500 cursor-pointer hover:text-slate-700 transition-colors" href="#">Classiche</a>
      <a data-category="vegane" class="pb-2 font-bold text-lg uppercase text-slate-500 cursor-pointer hover:text-slate-700 transition-colors" href="#">Vegane</a>
    </div>
  </div>

  <!-- Pizza List -->
  <div id="pizza-list" class="px-4 space-y-6 pb-24">
    <!-- Populated by JS -->
    <div class="flex justify-center py-12">
      <span class="material-symbols-outlined text-4xl text-primary animate-spin">sync</span>
    </div>
  </div>
