<h2 class="text-background-dark dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight text-center">Staff di King Pizza</h2>
<div class="h-1 w-16 bg-sauce mt-2 rounded-full"></div>
</div>
<!-- Welcome Header -->
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-2">Ehilà! Ben tornato</h1>
<div class="bg-primary/20 rounded-lg p-3 border border-primary/40">
<p class="text-background-dark dark:text-slate-300 text-sm font-medium leading-normal italic">
                        "Solo per i veri duri. Resta radicale."
                    </p>
</div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-4">
<label class="block">
<span class="text-slate-900 dark:text-slate-200 text-sm font-semibold mb-2 block px-1">Nome Utente Radicale</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-primary focus:border-crust focus:ring-crust bg-white dark:bg-slate-800 dark:text-white transition-all" placeholder="Inserisci il tuo nome radicale" type="text"/>
</div>
</label>
<label class="block">
<span class="text-slate-900 dark:text-slate-200 text-sm font-semibold mb-2 block px-1">Password Segreta</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="form-input block w-full pl-12 pr-4 py-4 rounded-xl border-primary focus:border-crust focus:ring-crust bg-white dark:bg-slate-800 dark:text-white transition-all" placeholder="••••••••" type="password"/>
</div>
</label>
</div>
<!-- Pizza Slice Login Button -->
<div class="pt-4 flex justify-center">
<button class="group relative flex items-center justify-center transition-transform hover:scale-105 active:scale-95 outline-none" type="submit">
<!-- Custom Shape Wrapper: Using a clipped path for a pizza slice look -->
<div class="bg-primary px-12 py-6 relative" style="clip-path: polygon(50% 100%, 0 0, 100% 0);">
<span class="text-background-dark font-black text-xl tracking-widest block -mt-4">ACCEDI</span>
<!-- Pepperoni dots -->
<div class="absolute top-2 left-4 size-2 bg-sauce rounded-full opacity-60"></div>
<div class="absolute top-4 right-6 size-3 bg-sauce rounded-full opacity-60"></div>
<div class="absolute top-1 right-12 size-2 bg-sauce rounded-full opacity-60"></div>
</div>
</button>
</div>
</form>
<!-- Bottom Illustration/Decoration -->
<div class="mt-12 opacity-30 flex justify-around">
<span class="material-symbols-outlined text-4xl">grade</span>
<span class="material-symbols-outlined text-4xl">nutrition</span>
<span class="material-symbols-outlined text-4xl">flare</span>
</div>
</div>

<div class="absolute top-0 left-0 w-full h-2 bg-crust/50"></div>
<div class="absolute bottom-0 left-0 w-full h-2 bg-crust/50"></div>
</div>
<!-- Background Decoration Images -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-10 overflow-hidden">
<div class="absolute top-10 left-10 transform -rotate-12 bg-white/20 p-4 rounded-xl">
<span class="material-symbols-outlined text-8xl">local_pizza</span>
</div>

<span class="material-symbols-outlined text-9xl">local_pizza</span>
</div>
